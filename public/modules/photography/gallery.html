<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摄影作品展示</title>
  <link rel="stylesheet" href="../shared/reveal.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="gallery">
  <main class="atlas-shell atlas-shell--gallery">
    <section class="gallery-view module-pop-surface delay-1">
      <div class="gallery-corner-tools module-pop-surface delay-2">
        <button id="panelToggleBtn" class="gallery-plus-btn" type="button" aria-label="打开操作菜单" aria-expanded="false">
          <img class="gallery-plus-icon" src="../words/img/Icons8/icons8-摄影-50.png" alt="" aria-hidden="true">
          <span class="gallery-plus-close" aria-hidden="true">×</span>
        </button>
        <div id="panelMenu" class="gallery-plus-menu" hidden>
          <div class="sidebar-actions sidebar-actions--menu">
            <button id="backToMapBtn" class="ghost-btn" type="button">返回地图</button>
          </div>

          <label class="field-label">
            <span>地点名称</span>
            <input id="anchorNameInput" type="text" maxlength="32" placeholder="输入地点名称">
          </label>

          <div class="meta-stack">
            <span id="anchorProvinceValue">所在省份</span>
            <span id="anchorPositionValue">地图坐标</span>
            <span id="anchorAlbumCountValue">0 个相册</span>
            <span id="anchorPhotoCountValue">0 张照片</span>
          </div>

          <div id="storagePanel" class="storage-panel" hidden>
            <span class="storage-panel-title">桌面保存位置</span>
            <div id="storagePathValue" class="storage-path-value">桌面版可在这里查看和修改保存目录</div>
            <div class="sidebar-actions sidebar-actions--menu storage-actions">
              <button id="changeStorageDirBtn" type="button">修改保存目录</button>
              <button id="resetStorageDirBtn" class="ghost-btn" type="button">恢复默认目录</button>
            </div>
          </div>

          <div class="sidebar-actions sidebar-actions--menu">
            <button id="createAlbumBtn" type="button">新建相册</button>
            <button id="addPhotosBtn" type="button">导入照片</button>
            <button id="deleteAlbumBtn" class="ghost-btn" type="button">删除相册</button>
            <button id="deleteAnchorBtn" class="ghost-btn" type="button">删除地点</button>
            <input id="photoInput" type="file" accept="image/*" multiple hidden>
          </div>
        </div>
      </div>

      <header class="gallery-topbar module-pop-surface delay-2">
        <div class="gallery-title-block">
          <p class="eyebrow">SHANLIC PHOTO ATLAS</p>
          <h2 id="galleryTitle">摄影作品</h2>
          <p id="galleryStatus" class="gallery-status" hidden></p>
        </div>
        <div class="gallery-hero-metrics">
          <article class="gallery-hero-card">
            <span>Province</span>
            <strong id="galleryProvinceBadge">--</strong>
          </article>
          <article class="gallery-hero-card">
            <span>Albums</span>
            <strong id="galleryAlbumBadge">0</strong>
          </article>
          <article class="gallery-hero-card">
            <span>Photos</span>
            <strong id="galleryPhotoBadge">0</strong>
          </article>
        </div>
      </header>

      <section class="gallery-panel">
        <div class="gallery-content module-pop-surface delay-3">
          <div class="gallery-toolbar">
            <button id="albumBackBtn" class="ghost-btn gallery-back-btn" type="button" hidden>返回相册列表</button>
            <div class="gallery-toolbar-copy">
              <strong id="contentTitle">相册书架</strong>
              <span id="contentSubtitle" hidden></span>
            </div>
          </div>

          <div id="galleryEmpty" class="gallery-empty" hidden>
            <strong></strong>
            <p></p>
          </div>

          <div id="albumShelf" class="album-shelf"></div>
          <div id="photoGrid" class="photo-grid" hidden></div>
        </div>
      </section>
    </section>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button id="lightboxCloseBtn" class="lightbox-close" type="button" aria-label="关闭预览">×</button>
    <figure class="lightbox-figure">
      <img id="lightboxImage" alt="摄影作品预览">
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <dialog id="actionDialog" class="anchor-name-dialog" aria-labelledby="actionDialogTitle">
    <form class="anchor-name-form" method="dialog">
      <div class="anchor-name-copy">
        <h2 id="actionDialogTitle">操作确认</h2>
        <p id="actionDialogMessage">请确认当前操作。</p>
      </div>
      <label id="actionDialogField" class="anchor-name-field" for="actionDialogInput">
        <span id="actionDialogLabel">名称</span>
        <input
          id="actionDialogInput"
          class="anchor-name-input"
          name="actionDialogInput"
          type="text"
          maxlength="40"
          autocomplete="off"
          spellcheck="false"
        >
      </label>
      <menu class="anchor-name-actions">
        <button id="actionDialogCancelBtn" class="anchor-name-btn anchor-name-btn--ghost" type="submit" value="cancel">取消</button>
        <button id="actionDialogConfirmBtn" class="anchor-name-btn" type="submit" value="confirm">确定</button>
      </menu>
    </form>
  </dialog>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="./gallery.js"></script>
</body>
</html>
